<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rabbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="160" rx="16" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="40" x2="520" y2="40" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="80" x2="520" y2="80" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="120" x2="520" y2="120" stroke="#ffffff08" stroke-width="1"/>

  <!-- === MASCOT: Speedy Rabbit === -->
  <!-- Motion trail lines (the "line" being skipped) -->
  <line x1="14" y1="112" x2="52" y2="112" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="14" y1="104" x2="44" y2="104" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="14" y1="96" x2="36" y2="96" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" opacity="0.15"/>

  <!-- People waiting in line (simplified stick figures) -->
  <!-- Person 1 -->
  <circle cx="22" cy="88" r="5" fill="#374151"/>
  <line x1="22" y1="93" x2="22" y2="108" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="97" x2="17" y2="103" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="97" x2="27" y2="103" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="108" x2="18" y2="116" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="108" x2="26" y2="116" stroke="#374151" stroke-width="2" stroke-linecap="round"/>

  <!-- Person 2 -->
  <circle cx="38" cy="91" r="5" fill="#374151"/>
  <line x1="38" y1="96" x2="38" y2="111" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="38" y1="100" x2="33" y2="106" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="100" x2="43" y2="106" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="111" x2="34" y2="119" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="111" x2="42" y2="119" stroke="#374151" stroke-width="2" stroke-linecap="round"/>

  <!-- The Rabbit mascot (jumping/leaping forward) -->
  <!-- Speed lines behind rabbit -->
  <line x1="52" y1="72" x2="64" y2="72" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="50" y1="80" x2="65" y2="80" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="54" y1="88" x2="65" y2="88" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Rabbit body -->
  <ellipse cx="80" cy="90" rx="14" ry="12" fill="url(#rabbitGrad)" filter="url(#glow)"/>

  <!-- Rabbit head -->
  <circle cx="92" cy="76" r="10" fill="url(#rabbitGrad)" filter="url(#glow)"/>

  <!-- Rabbit ears (tall, one leaning forward) -->
  <ellipse cx="87" cy="58" rx="3.5" ry="10" fill="url(#rabbitGrad)" transform="rotate(-8 87 58)"/>
  <ellipse cx="88" cy="59" rx="1.5" ry="7" fill="#f3e8ff" opacity="0.6" transform="rotate(-8 88 59)"/>
  <ellipse cx="96" cy="56" rx="3" ry="9" fill="url(#rabbitGrad)" transform="rotate(10 96 56)"/>
  <ellipse cx="96" cy="57" rx="1.2" ry="6" fill="#f3e8ff" opacity="0.6" transform="rotate(10 96 57)"/>

  <!-- Rabbit eye -->
  <circle cx="96" cy="74" r="2.5" fill="#0f0f1a"/>
  <circle cx="97" cy="73" r="1" fill="#ffffff" opacity="0.8"/>

  <!-- Rabbit nose -->
  <ellipse cx="101" cy="78" rx="2" ry="1.5" fill="#f9a8d4"/>

  <!-- Rabbit smile -->
  <path d="M 99 80 Q 101 83 103 80" stroke="#0f0f1a" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Rabbit arm/paw holding notification bell -->
  <path d="M 90 88 Q 98 84 104 80" stroke="#a78bfa" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Notification bell -->
  <path d="M 106 68 Q 106 62 112 62 Q 118 62 118 68 L 119 75 L 105 75 Z" fill="#fbbf24" filter="url(#glow)"/>
  <rect x="109" y="75" width="6" height="2.5" rx="1" fill="#fbbf24"/>
  <circle cx="112" cy="79" r="2.5" fill="#fbbf24"/>
  <!-- Bell shine -->
  <ellipse cx="109" cy="66" rx="1.5" ry="2" fill="#ffffff" opacity="0.4" transform="rotate(-15 109 66)"/>
  <!-- Notification dot -->
  <circle cx="119" cy="62" r="4" fill="#ef4444" filter="url(#glow)"/>
  <text x="119" y="65.5" font-family="monospace" font-size="6" fill="white" text-anchor="middle" font-weight="bold">1</text>

  <!-- Rabbit legs (leaping pose) -->
  <path d="M 70 96 Q 62 106 60 116" stroke="#a78bfa" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 74 100 Q 68 112 72 120" stroke="#a78bfa" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Feet -->
  <ellipse cx="59" cy="118" rx="6" ry="3" fill="url(#rabbitGrad)" transform="rotate(-20 59 118)"/>
  <ellipse cx="72" cy="121" rx="6" ry="3" fill="url(#rabbitGrad)" transform="rotate(10 72 121)"/>

  <!-- Tail -->
  <circle cx="66" cy="90" r="6" fill="#f3e8ff" opacity="0.7"/>

  <!-- === LOGO TEXT === -->
  <!-- "skip-the-line" main title -->
  <text x="148" y="82" font-family="'Courier New', Courier, monospace" font-size="38" font-weight="700" fill="url(#accentGrad)" filter="url(#glow)" letter-spacing="-1">skip-the-line</text>

  <!-- Accent underline -->
  <rect x="148" y="88" width="352" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.5"/>

  <!-- Tagline -->
  <text x="150" y="115" font-family="'Courier New', Courier, monospace" font-size="14" fill="#94a3b8" letter-spacing="1">PR notifications. No waiting.</text>

  <!-- Small GitHub → Slack icons row -->
  <!-- GitHub mark (simplified octocat circle) -->
  <circle cx="150" cy="138" r="8" fill="#6e7681" opacity="0.8"/>
  <text x="150" y="142" font-family="monospace" font-size="9" fill="white" text-anchor="middle">GH</text>

  <!-- Arrow -->
  <path d="M 161 138 L 168 138" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 165 135 L 168 138 L 165 141" stroke="#7c3aed" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Slack # -->
  <rect x="171" y="130" width="16" height="16" rx="4" fill="#4a154b" opacity="0.9"/>
  <text x="179" y="142" font-family="monospace" font-size="10" fill="#e01e5a" text-anchor="middle" font-weight="bold">#</text>

  <!-- Separator -->
  <line x1="196" y1="132" x2="196" y2="144" stroke="#374151" stroke-width="1"/>

  <!-- Stats badge -->
  <rect x="202" y="130" width="118" height="16" rx="8" fill="#7c3aed" opacity="0.2"/>
  <text x="261" y="142" font-family="'Courier New', Courier, monospace" font-size="11" fill="#a78bfa" text-anchor="middle">~40% faster merges</text>

  <!-- Border accent -->
  <rect width="520" height="160" rx="16" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.4"/>
</svg>
