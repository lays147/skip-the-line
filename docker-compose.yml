services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      GITHUB_WEBHOOK_SECRET: test-secret
      GITHUB_TOKEN: test-token
      SLACK_BOT_TOKEN: xoxb-test-token
      PORT: "8080"
      LOG_ENV: dev
      # Point clients at local mock servers instead of the real APIs.
      SLACK_API_URL: http://mock-slack:3000/api/
      GITHUB_API_URL: http://mock-github:4000/
    depends_on:
      - mock-slack
      - mock-github
    networks:
      - skip-the-line

  # Logs all incoming Slack API calls (users.lookupByEmail, chat.postMessage, etc.)
  mock-slack:
    image: mendhak/http-https-echo:latest
    environment:
      HTTP_PORT: "3000"
    ports:
      - "3000:3000"
    networks:
      - skip-the-line

  # Logs all incoming GitHub API calls (team membership, etc.)
  mock-github:
    image: mendhak/http-https-echo:latest
    environment:
      HTTP_PORT: "4000"
    ports:
      - "4000:4000"
    networks:
      - skip-the-line

networks:
  skip-the-line:
    driver: bridge
